name: Python Selenium Tests

on:
  workflow_dispatch:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r e2e_tests/requirement.txt

      - name: Create Report Directory
        run: mkdir -p pytest-report

      - name: Run Pytest
        working-directory: e2e_tests
        env:
          PYTHONPATH: ${{ github.workspace }}/e2e_tests
        run: |
          pytest test_cases/test_dashboard/test_client_need_attention.py -s -v -n 3
            

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report/report.html